server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: sem-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sem?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  # 上传文件大小限制（证件、简历、荣誉证明附件）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发期打印 SQL，生产关闭
  global-config:
    db-config:
      logic-delete-field: deleted     # 全局逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:mapper/**/*.xml
  type-enums-package: com.xju.sem.common.enums   # 枚举自动扫描（@EnumValue）

# 业务自定义配置
sem:
  jwt:
    secret: sem-platform-jwt-secret-key-change-me-in-production-0123456789
    expire-minutes: 720            # access token 有效期（分钟）
    refresh-expire-days: 7
    header: Authorization
    prefix: "Bearer "
  upload:
    dir: ./data/upload             # 本地上传目录（演示期）
  help:
    followup-limit: 3              # 单个求助单追问次数上限
    route-top-k: 20                # 路由匹配一次通知的校友数上限
    route-sla-hours: 24            # 路由通知 SLA（发布后N小时内至少1次通知）
  knowledge:
    stat-min-sample: 20            # 去向统计最低样本门槛（<此值只显示"样本不足"）
  opportunity:
    closing-soon-hours: 72         # 距 deadline 多少小时内转 CLOSING_SOON
    archive-days: 14               # CLOSED 后多少天自动归档转 ENDED（无 event_end_time 列，统一按 deadline 计算）

logging:
  level:
    com.xju.sem: debug
